name: Docker 构建和发布

on:
  push:
    branches:
      - main
  schedule:
    - cron: "13 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v2

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: 登录到 Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 获取最新版本
        id: fetch-version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/dushixiang/next-terminal/releases/latest | jq -r '.tag_name')
          CURRENT_VERSION=$(cat version)
          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "版本匹配，跳过构建。"
            echo "::set-output name=skip_build::true"
          else
            echo "::set-output name=latest_version::$LATEST_VERSION"
          fi

      - name: 比较配置文件
        id: compare-config
        run: |
          LOCAL_FILE="sql/config.yaml"
          REMOTE_URL="https://f.typesafe.cn/next-terminal/config.yaml"
          
          curl -s $REMOTE_URL -o remote_config.yaml
          
          if diff -qZ "$LOCAL_FILE" remote_config.yaml > /dev/null; then
            echo "配置文件与远程一致，验证通过。"
            echo "::set-output name=skip_build::false"
          else
            echo "配置文件与远程不匹配（官方可能已更新），为了安全跳过构建。"
            echo "::set-output name=skip_build::true"
          fi

      - name: 构建并推送 Docker 镜像
        if: steps.fetch-version.outputs.skip_build != 'true' && steps.compare-config.outputs.skip_build != 'true'
        run: |
          LATEST_VERSION=${{ steps.fetch-version.outputs.latest_version }}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          REPO="aaronlee/next-terminal"
          
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${REPO}:latest \
            -t ${REPO}:${LATEST_VERSION} \
            -t ${REPO}:${LATEST_VERSION}-${TIMESTAMP} \
            --push .

      - name: 更新仓库文件 (Version & Time) 并推送到 GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          
          # 1. 只有在构建成功后才更新版本号
          if [ "${{ steps.fetch-version.outputs.skip_build }}" != "true" ] && [ "${{ steps.compare-config.outputs.skip_build }}" != "true" ]; then
            LATEST_VERSION=${{ steps.fetch-version.outputs.latest_version }}
            echo $LATEST_VERSION > version
            git add version
            COMMIT_MSG="版本更新为 $LATEST_VERSION"
          else
            COMMIT_MSG="运行记录更新"
          fi
          
          # 2. 无论是否构建，都更新运行时间
          current_time=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")
          echo "$current_time" > time
          git add time
          
          # 3. 提交并推送
          git commit -m "$COMMIT_MSG - 北京时间: $current_time"
          git push origin main
